global:
  resolve_timeout: 5m

route:
  receiver: 'telegram-default'
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - matchers:
        - alertname =~ "MongoDBDown|PostgreSQLDown|KafkaDown"
      receiver: 'telegram-critical'
      group_wait: 10s
      repeat_interval: 1h

    - matchers:
        - severity = "critical"
      receiver: 'telegram-critical'
      group_wait: 10s
      repeat_interval: 3h

# Khi critical firing trên instance → chặn toàn bộ warning cùng instance (tránh spam)
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['instance']

receivers:
  - name: 'telegram-default'
    telegram_configs:
      - bot_token: ''
        chat_id: 0
        parse_mode: 'HTML'
        send_resolved: true
        message: |
          {{ range .Alerts }}
          {{ if eq .Status "firing" }}🟡 <b>CẢNH BÁO</b>{{ else }}✅ <b>ĐÃ KHẮC PHỤC</b>{{ end }}
          <b>Loại:</b> {{ .Labels.alertname }}
          <b>Máy chủ:</b> {{ .Labels.instance }} (103.97.125.64)
          <b>Tóm tắt:</b> {{ .Annotations.summary }}
          <b>Chi tiết:</b> {{ .Annotations.description }}
          <b>Thời gian:</b> {{ .StartsAt.Format "02/01/2006 15:04:05" }}
          {{ end }}

  - name: 'telegram-critical'
    telegram_configs:
      - bot_token: ''
        chat_id: 0
        parse_mode: 'HTML'
        send_resolved: true
        message: |
          {{ range .Alerts }}
          {{ if eq .Status "firing" }}🔴 <b>KHẨN CẤP</b>{{ else }}✅ <b>ĐÃ KHẮC PHỤC</b>{{ end }}
          <b>Loại:</b> {{ .Labels.alertname }}
          <b>Máy chủ:</b> {{ .Labels.instance }} (103.97.125.64)
          <b>Tóm tắt:</b> {{ .Annotations.summary }}
          <b>Chi tiết:</b> {{ .Annotations.description }}
          <b>Thời gian:</b> {{ .StartsAt.Format "02/01/2006 15:04:05" }}
          {{ end }}
