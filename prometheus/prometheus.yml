global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'social-listening'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape thêm alertmanager để biết khi nó down
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  - job_name: 'node-exporter-local'
    static_configs:
      - targets: ['host.docker.internal:9101']
        labels:
          instance: 'vps-main'
          env: 'production'

  - job_name: 'gateway'
    static_configs:
      - targets: ['host.docker.internal:4416']
        labels:
          service: 'gateway'
          env: 'production'

  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka-exporter:9308']
        labels:
          service: 'kafka'

  # Thêm các VPS khác ở đây
  # - job_name: 'node-exporter-remote'
  #   static_configs:
  #     - targets:
  #         - 'vps2.internal:9100'
  #         - 'vps3.internal:9100'
