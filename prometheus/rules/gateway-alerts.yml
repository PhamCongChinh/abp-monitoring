groups:
  - name: gateway_alerts
    rules:
      - alert: PlatformDataStalled
        expr: |
          gateway_posts_by_platform_total{platform=~"facebook|youtube|web"} > 0
          and rate(gateway_posts_by_platform_total{platform=~"facebook|youtube|web"}[1h]) == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Không có tin bài mới từ <b>{{ $labels.platform }}</b>"
          description: "<b>{{ $labels.platform }}</b> không có bài mới trong 1 giờ qua (tổng: {{ $value | humanize }} bài)"

      - alert: GatewayDLQNotEmpty
        expr: gateway_dlq_size > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Dead letter queue có {{ $value }} message bị lỗi"
          description: "gateway_dlq_size > 0 liên tục 5 phút — có message không ghi được vào Kafka"

      - alert: GatewayKafkaWriteFailure
        expr: rate(gateway_kafka_write_total{result!="success"}[5m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Kafka write thất bại trên topic {{ $labels.topic }}"
          description: "Có lỗi ghi Kafka liên tục 2 phút trên topic {{ $labels.topic }}"

      - alert: GatewayHigh500Rate
        expr: |
          sum(rate(gateway_http_errors_total{code="500"}[5m]))
          /
          sum(rate(gateway_requests_total[5m])) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Tỉ lệ lỗi 500 vượt 1% ({{ $value | humanizePercentage }})"
          description: "Tỉ lệ HTTP 500 liên tục > 1% trong 2 phút — kiểm tra logs gateway ngay"

      - alert: GatewayUnknownPlatformBot
        expr: rate(gateway_unknown_platform_total[10m]) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Bot gửi platform lạ: {{ $value | humanize }} req/s"
          description: "Có nguồn gửi liên tục platform không hợp lệ — có thể là bot scan hoặc client lỗi cấu hình"
