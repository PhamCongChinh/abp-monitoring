groups:
  - name: node_alerts
    rules:
      - alert: HostHighCpuLoad
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU cao trên {{ $labels.instance }}"
          description: "CPU vượt 85% liên tục 5 phút (hiện tại: {{ $value | humanize }}%)"

      - alert: HostOutOfMemory
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "RAM sắp hết trên {{ $labels.instance }}"
          description: "RAM còn lại dưới 10% (hiện tại: {{ $value | humanize }}%)"

      - alert: HostOutOfDiskSpace
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 60
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk sắp đầy trên {{ $labels.instance }}"
          description: "Phân vùng / đã dùng trên 60% (hiện tại: {{ $value | humanize }}%)"

      - alert: HostSwapUsageHigh
        expr: node_memory_SwapTotal_bytes > 0 and (1 - (node_memory_SwapFree_bytes / node_memory_SwapTotal_bytes)) * 100 > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Swap cao trên {{ $labels.instance }}"
          description: "Swap đã dùng trên 80% (hiện tại: {{ $value | humanize }}%)"

      - alert: NodeExporterDown
        expr: up{job=~"node-exporter.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Mất kết nối tới {{ $labels.instance }}"
          description: "Node exporter trên {{ $labels.instance }} không phản hồi hơn 2 phút"
