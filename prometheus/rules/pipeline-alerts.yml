groups:

  # ─── CRITICAL — gọi ngay ───────────────────────────────────────────────────
  - name: pipeline_critical
    rules:

      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} DOWN"
          description: "{{ $labels.job }} tại {{ $labels.instance }} không phản hồi hơn 2 phút"

      - alert: PlatformNoData2h
        expr: increase(gateway_posts_by_platform_total{platform!~"news_page|tt"}[2h]) == 0
        for: 5m
        labels:
          severity: critical
          platform: "{{ $labels.platform }}"
        annotations:
          summary: "{{ $labels.platform }} không có data 2h"
          description: "Crawler {{ $labels.platform }} bị block, API 429/403, hoặc pipeline tắc trước Kafka"

      - alert: OOMKillDetected
        expr: increase(node_vmstat_oom_kill[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "OOM Kill trên {{ $labels.instance }}"
          description: "Kernel đã kill process vì hết RAM — nghi phạm: MongoDB hoặc headless browser. Kiểm tra container_memory_failcnt"

      - alert: DiskCritical
        expr: |
          (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"}
          / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"}) * 100 < 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Disk còn {{ $value | humanize }}% — MongoDB sẽ dừng ghi"
          description: "Mount {{ $labels.mountpoint }} trên {{ $labels.instance }} sắp đầy"

      - alert: KafkaTotalLagExplosion
        expr: sum(kafka_consumergroup_lag) > 200000
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Kafka lag {{ $value | humanize }} messages — pipeline gần vỡ"
          description: "Consumer xử lý quá chậm hoặc đã chết — data đang tồn đọng cực lớn"

  # ─── WARNING — xem trong giờ ───────────────────────────────────────────────
  - name: pipeline_warning
    rules:

      - alert: KafkaLagGrowing
        expr: deriv(sum by (consumergroup, topic) (kafka_consumergroup_lag)[10m:1m]) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka lag đang tăng đều ({{ $labels.topic }} / {{ $labels.consumergroup }})"
          description: "Consumer không theo kịp producer — downstream có thể đang nghẽn. Kiểm tra BullMQ / Java processor"

      - alert: KafkaHighLag
        expr: sum by (consumergroup, topic) (kafka_consumergroup_lag) > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka lag cao: {{ $value | humanize }} ({{ $labels.topic }})"
          description: "Tồn đọng lớn — nếu tăng tiếp sẽ thành critical"

      - alert: MongoDBConnectionsHigh
        expr: |
          mongodb_connections{state="current"}
          / (mongodb_connections{state="current"} + mongodb_connections{state="available"})
          > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MongoDB đang dùng {{ $value | humanizePercentage }} số kết nối tối đa"
          description: "Client không dùng connection pool đúng — combo này từng gây Mongo chết hàng loạt"

      - alert: DiskWarning
        expr: |
          (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"}
          / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"}) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk {{ $value | humanize }}% — cần dọn sớm"
          description: "Mount {{ $labels.mountpoint }} đang đầy dần. Kafka log + MongoDB data tăng nhanh"
